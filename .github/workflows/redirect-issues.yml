name: Transfer issues to main repo
on:
  issues:
    types: [opened]

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Transfer to homeassistant-ai/ha-mcp
        env:
          GH_TOKEN: ${{ secrets.ISSUE_TRANSFER_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          # GraphQL node ID of homeassistant-ai/ha-mcp
          TARGET_REPO_ID: R_kgDOPvq5vQ
        run: |
          gh api graphql \
            -f query='mutation($issueId: ID!, $repoId: ID!) {
              transferIssue(input: {issueId: $issueId, repositoryId: $repoId, createRedirect: true}) {
                issue { url number }
              }
            }' \
            -f issueId="$ISSUE_NODE_ID" \
            -f repoId="$TARGET_REPO_ID"
